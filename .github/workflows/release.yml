name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Desktop app (macOS / Windows / Linux) ─────────────────────────────────
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'xTransfer-P2P ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Universal) | `.dmg` |
            | Windows | `.msi` or `.exe` |
            | Linux | `.AppImage` or `.deb` |

            **Relay server** (for self-hosting): see `xtransfer-relay-windows.exe` asset below.

            > **macOS note:** Right-click → Open the first time (app is not yet notarized).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Relay server binary (Windows only — for AWS deployment) ───────────────
  relay-server:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build relay server
        run: cargo build --release -p xtransfer-relay

      - name: Upload relay binary to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: target/release/xtransfer-relay.exe
          name: 'xTransfer-P2P ${{ github.ref_name }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
